services:
  backend:
    build: 
      context: .
    restart: always
    container_name: backend
    env_file:
      - .env
    networks:
      - backend
    # command: bash -c 'pnpm migrate:ci && pm2-runtime start ecosystem.config.js'
    depends_on:
      - postgres
      - redis
      - migration
    environment:
      - NODE_ENV=${ENVIRONMENT} # set in .env
    ports:
      - '${PORT:-3000}:3000'
    dns:
      - 8.8.8.8
      - 8.8.4.4

  migration:
    build: 
      context: .
    # restart: always
    container_name: migration
    env_file:
      - .env
    networks:
      - backend
    command: pnpm migrate:ci
    depends_on:
      - postgres
      - redis
    environment:
      - NODE_ENV=${ENVIRONMENT} # set in .env
    dns:
      - 8.8.8.8
      - 8.8.4.4

  postgres:
    image: postgres:15.12
    container_name: postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DATABASE}
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - backend
    volumes:
      - ./data_postgresql:/var/lib/postgresql/data

  redis:
    image: redis:8.0-M03-alpine3.21
    restart: always
    container_name: redis
    command: ["redis-server", "--appendonly", "no", "--maxmemory", "600mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - 6379:6379

networks:
  backend:
    driver: bridge
