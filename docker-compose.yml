services:
  postgres:
    image: postgres:15.12
    container_name: wastetrade-postgres
    environment:
      POSTGRES_USER: wastetrade
      POSTGRES_PASSWORD: wastetrade123
      POSTGRES_DB: wastetrade
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5450:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres-init:
    image: postgres:15.12
    container_name: wastetrade-postgres-init
    depends_on:
      - postgres
    environment:
      PGHOST: postgres
      PGUSER: wastetrade
      PGPASSWORD: wastetrade123
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      psql -tc \"SELECT 1 FROM pg_database WHERE datname = 'strapi'\" | grep -q 1 || psql -c 'CREATE DATABASE strapi';
      exit 0;
      "
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: wastetrade-redis
    command: ["redis-server", "--appendonly", "no", "--maxmemory", "600mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: wastetrade-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: wastetrade-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/wastetrade;
      mc anonymous set download local/wastetrade;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
