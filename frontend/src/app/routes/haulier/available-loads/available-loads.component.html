<app-haulier-layout [title]="'Available Loads' | translate">
  <form class="row mb-4" (ngSubmit)="onSearch(searchInput.value)">
    <div class="col-8 col-md-9">
      <mat-form-field appearance="outline" class="w-100">
        <input #searchInput matInput type="text" maxlength="50" [placeholder]="'What are you looking for?' | translate" />
      </mat-form-field>
    </div>
    <div class="col-4 col-md-3" style="padding-left: 0">
      <button type="submit" mat-flat-button class="background-primary w-100 h-100 fs-16">
        <mat-icon class="d-none d-md-block">search</mat-icon>
        {{ 'SEARCH' | translate }}
      </button>
    </div>
  </form>

  <div style="margin-bottom: 60px">
    <app-filter
      [onlyFilter]="true"
      [displayFilter]="[
        'pickupCountry',
        'destinationCountry',
        'delivery',
        'haulierMaterialType',
        'haulierMaterialItem',
        'haulierMaterialPacking',
      ]"
      (filterChanged)="onFilterChanged($event)"
    ></app-filter>
  </div>

  @if (loading()) {
    <app-spinner></app-spinner>
  } @else {
    @if (displayItems().length === 0) {
      <div class="fs-24 empty-message-container">
        <p class="text-muted text-center">
          {{ 'No results found. Please adjust your search criteria.' | translate }}
        </p>
      </div>
    } @else {
      <p class="fw-bold text-uppercase mb-4">{{ displayItems().length }} results of {{ totalCount() }}</p>

      @for (item of displayItems(); track $index) {
        <app-haulage-load-row [item]="item" [isApproved]="isApproved()"></app-haulage-load-row>
      }

      <!-- Pagination -->

      <app-pagination [pageNumber]="page()" [totalCount]="totalCount()" (pageChange)="onPageChange($event)"> </app-pagination>
    }
  }
</app-haulier-layout>
